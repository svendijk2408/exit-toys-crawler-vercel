name: EXIT Toys Crawler

on:
  schedule:
    # Dagelijks om 04:00 UTC (06:00 Amsterdam)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  crawl-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          cd crawler
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci

      # === NL Crawl (exittoys.nl) ===
      - name: Run crawler (NL)
        run: |
          cd crawler
          python main.py --force --locale nl

      - name: Upload to Vercel Blob (NL)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          CRAWLER_LOCALE: nl
        run: node scripts/upload-to-blob.mjs

      # === DE Crawl (exittoys.de) ===
      - name: Run crawler (DE)
        run: |
          cd crawler
          python main.py --force --locale de

      - name: Upload to Vercel Blob (DE)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          CRAWLER_LOCALE: de
        run: node scripts/upload-to-blob.mjs
